name: Backend CI

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'backend/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
        
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
        
    - name: Install dependencies
      run: go mod download
      
    - name: Vet / Lint
      run: go vet ./...
      
    - name: Test
      run: go test -v ./...
      
    - name: Build
      run: go build -v ./...
      
    - name: Test Docker Build
      run: docker build -t tracely-backend .
