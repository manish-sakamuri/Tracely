name: tracely
description: API debugging, distributed tracing and scenario automation platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  flutter_animate: ^4.5.0
  google_fonts: ^6.3.3
  google_sign_in: ^6.3.0
  flutter_dotenv: ^5.2.1
  shared_preferences: ^2.2.2
  http: ^1.2.1
  url_launcher: ^6.2.5
  app_links: ^6.3.3
  video_player: ^2.9.2
  flutter_native_splash: ^2.4.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

# ── Launcher icon configuration ──
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/logo.png"

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/logo.png
  android: true
  ios: true
  android_12:
    color: "#FFFFFF"
    image: assets/logo.png

flutter:
  uses-material-design: true
  assets:
    - assets/
